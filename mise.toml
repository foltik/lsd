[tools]
node = "latest"
rust = "latest"

## Styles

[tasks."build:styles"]
run = "npm run build:styles"
sources = ["frontend/styles/**/*.css"]

[tasks."watch:styles"]
run = "npm run watch"
sources = ["frontend/styles/**/*.css"]

## App

[tasks."build:app"]
run = "cargo build"

[tasks."run:app"]
run = "cargo run config/dev.toml"
depends = ["build:app"]
sources = ["Cargo.toml", "src/**/*.rs", "frontend/templates/**/*.tera.html"]
alias = "dev"

[tasks."watch:app"]
run = "mise watch -r run:app --stdin-quit"
