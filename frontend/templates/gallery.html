{% extends "layout.html" %}

{% block title %}light and sound - gallery{% endblock title %}

{% block content %}
  <section id="gallery" class="ext/layout">
    <div id="grid">
      {% for flyer in flyers.iter() %}
        <a class="flyer {% if flyer.unlisted %}unlisted{% endif %}"
          href="/e/{{ flyer.slug }}"
          draggable="false"
          data-title="{{ flyer.title }}"
          data-w="{{ flyer.width }}"
          data-h="{{ flyer.height }}"
          style="--ratio: {{ flyer.width as f32 / flyer.height as f32 }};"
        >
          <span class="image">
            <img
              class="image-thumb"
              loading="lazy"
              fetchpriority="high"
              src="/e/{{ flyer.slug }}/flyer?size=thumb"
              aria-hidden="true"
              draggable="false"
            />
            <img
              class="image-sm"
              loading="lazy"
              fetchpriority="low"
              src="/e/{{ flyer.slug }}/flyer?size=sm"
              draggable="false"
            />
          </span>
        </a>
      {% endfor %}
    </div>
  </section>
{% endblock content %}

{% block scripts %}
  <script>
    const grid = document.getElementById("grid");
    const gallery = document.getElementById("gallery");
    const flyers = [...grid.children];

    // Shuffle flyers on each visit
    for (let i = flyers.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [flyers[i], flyers[j]] = [flyers[j], flyers[i]];
    }

    /* ---------- Masonry layout ---------------------------- */
    let activeNumCols = 0;
    function layout() {
      // Re-layout if number of columns changes
      let numCols = Math.round(grid.clientWidth / 260);
      numCols = Math.max(3, Math.min(6, numCols));
      if (numCols == activeNumCols)
        return;

      // Create columns with running height totals
      const cols = [...Array(numCols)]
        .map(() => Object.assign(
          document.createElement("div"),
          {className: "col", height: 0},
        ));

      // Insert each image into the shortest column so far
      for (const flyer of flyers) {
        const shortest = cols.reduce((a, b) => b.height < a.height ? b : a);
        shortest.append(flyer);
        shortest.height += flyer.dataset.h / flyer.dataset.w;
      }

      grid.replaceChildren(...cols);
      activeNumCols = numCols;
    }

    // Fade from thumb to sm once the larger image loads.
    for (const image of grid.querySelectorAll(".image-sm")) {
      if (image.complete)
        image.classList.add("loaded");
      else
        image.addEventListener("load", () => image.classList.add("loaded"), { once: true });
    }

    // Debounced re-layout on resize
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(layout, 150);
    });

    // Initial layout
    layout();

    /* ---------- Click to enlarge -------------------------- */
    let animating = false;
    function zoom(flyer) {
      if (animating) return;
      animating = true;

      const image = flyer.querySelector(".image");
      const image_sm = flyer.querySelector(".image-sm");
      // Start loading a larger image
      const image_lg = new Image();
      image_lg.src = image_sm.src.replace("size=sm", "size=lg");

      // Fit into the viewport at the flyer's aspect, leaving room above for the title
      const aspect = image.clientWidth / image.clientHeight;
      const width = Math.min(window.innerWidth * 0.85, window.innerHeight * 0.72 * aspect);

      // Create overlay
      const overlay = document.createElement("div");
      overlay.id = "flyer-zoom";
      overlay.innerHTML = `<p class="title"></p><img alt="" draggable="false">`;
      const [title, image_overlay] = overlay.children;
      title.textContent = flyer.dataset.title;
      image_overlay.style.width = `${width}px`;
      image_overlay.style.height = `${width / aspect}px`;
      image_overlay.src = image_sm.currentSrc || image_sm.src;


      document.body.append(overlay);
      image.style.visibility = "hidden";
      gallery.classList.add("zoomed");

      // Animate to center
      const from = image.getBoundingClientRect();
      const to = image_overlay.getBoundingClientRect();
      const center = "translate3d(0, 0, 0) scale(1)";
      const translate = `translate3d(${from.left - to.left}px, ${from.top - to.top}px, 0) scale(${from.width / to.width})`;
      const timing = { duration: 200, easing: "ease-out", fill: "forwards" };
      const animate = (open, at = center) => {
        const [start, end] = open ? [translate, center] : [at, translate];
        image_overlay.style.transform = start; // paint at the start before WAAPI's first tick, so there's no flash/jump
        title.animate({ opacity: open ? [0, 1] : [1, 0] }, timing);
        const anim = image_overlay.animate({ transform: [start, end] }, timing);
        // Bake the final frame into inline styles and drop, to avoid recalc and shift.
        return anim.finished.then(() => { anim.commitStyles(); anim.cancel(); });
      };

      animate(true).then(() => {
        animating = false;
        const swap = () => {
          image_overlay.src = image_lg.src;
          image_sm.src = image_lg.src;
        };
        if (image_lg.complete) swap();
        else image_lg.addEventListener("load", swap, { once: true });
      });

      // Restore the page and drop the overlay
      function cleanup() {
        image.style.visibility = "";
        document.removeEventListener("keydown", onKey);
        window.removeEventListener("scroll", onScroll);
        overlay.remove();
      }

      // Unzoom and animate image back to its original position
      // Starts from `at` (center for a tap, the drag position for a swipe)
      let closing = false;
      function close(at = center) {
        if (animating || closing) return;
        closing = true;

        gallery.classList.remove("zoomed");
       // Let taps reach the gallery while it animates out
        overlay.style.pointerEvents = "none";

        // Animate opacity back in
        const opacity = overlay.style.opacity || 1;
        overlay.style.opacity = "";
        overlay.animate({ opacity: [opacity, 1] }, timing);

        animate(false, at).then(cleanup);
      }

      // Dismiss with escape
      const onKey = (e) => { if (e.key === "Escape") close(); };
      document.addEventListener("keydown", onKey);

      // Dismiss by scrolling
      const scrollY0 = window.scrollY;
      const onScroll = () => {
        overlay.style.transform = `translateY(${scrollY0 - window.scrollY}px)`;
        close();
      };
      window.addEventListener("scroll", onScroll, { passive: true });


      /* ---------- Swipe to dismiss -------------------------- */
      let x0, y0, dx, dy, t, speed;
      let dragging = false;
      overlay.addEventListener("pointerdown", (e) => {
        if (animating) return;
        dragging = true;

        // Record initial scroll time/position
        dx = dy = speed = 0;
        x0 = e.clientX;
        y0 = e.clientY;
        t = e.timeStamp;

        overlay.setPointerCapture(e.pointerId);
      });
      overlay.addEventListener("pointermove", (e) => {
        if (!dragging) return;

        // Calculate velocity
        const dx1 = e.clientX - x0;
        const dy1 = e.clientY - y0;
        const dt = e.timeStamp - t;
        if (dt) speed = Math.hypot(dx1 - dx, dy1 - dy) / dt;

        dx = dx1;
        dy = dy1;
        t = e.timeStamp;

        // Animate to dragged position and gradually fade out
        image_overlay.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
        overlay.style.opacity = 1 - Math.min(Math.hypot(dx, dy) / 250, 0.85);
      });
      const release = () => {
        if (!dragging) return;
        dragging = false;

        const dist = Math.hypot(dx, dy);

        // Close on quick tap
        if (dist < 6)
          close();
        // Close on swipe away
        else if (dist > 90 || speed > 0.5)
          close(image_overlay.style.transform);

        else settle();
      };
      overlay.addEventListener("pointerup", release);
      overlay.addEventListener("pointercancel", release);

      // Spring back to center
      function settle() {
        const opacity = overlay.style.opacity || 1;
        const dragged = `translate3d(${dx}px, ${dy}px, 0)`;
        image_overlay.style.transform = center;
        overlay.style.opacity = "";
        image_overlay.animate({ transform: [dragged, center] }, { duration: 200, easing: "ease-out" });
        overlay.animate({ opacity: [opacity, 1] }, { duration: 200 });
      }
    }

    // Open on pointerup, not click, since iOS delays the click after a tap
    for (const flyer of flyers) {
      let x0, y0;
      flyer.addEventListener("pointerdown", (e) => {
        x0 = e.clientX;
        y0 = e.clientY;
      });
      flyer.addEventListener("pointerup", (e) => {
        if (Math.hypot(e.clientX - x0, e.clientY - y0) < 10)
          zoom(flyer);
      });
      flyer.addEventListener("click", (e) => e.preventDefault());
    }
  </script>
{% endblock scripts %}
