{% extends "layout_no_nav.html" %}

{% block nav %}
  <nav id="events/rsvp/nav">
    {% block back %}
    {% endblock back %}
    <span class="title">{{ event.title }}</span>
  </nav>
  <div id="events/rsvp/progress">
    {% block progress %}
    {% endblock progress %}
  </div>
  <script>
    document.getElementById("back")?.addEventListener("click", e => {
      e.preventDefault();
      if (history.length > 1) history.back();
      else location.replace(e.currentTarget.href);
    });
  </script>
{% endblock nav %}
