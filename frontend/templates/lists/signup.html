{% extends "layout.html" %}

{% block title %}light and sound - Sign Up{% endblock title %}

{% block head %}
  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js"
    async
    defer
  ></script>
{% endblock head %}

{% block content %}
  <section id="lists/signup" class="ext/layout standard">
    <header>
      <h1>Sign up for {{ list.description }}</h1>
    </header>
    <form class="ext/form" action="/lists/{{ list.id }}/signup" method="post">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" name="email" />
      </div>
      <input type="hidden" name="list_id" value="{{ list.id }}" />

      <div
        class="cf-turnstile"
        data-sitekey="{{ turnstile_site_key }}"
        data-callback="onTurnstileSuccess"
        data-error-callback="onTurnstileError"
        data-expired-callback="onTurnstileError"
      ></div>

      <button id="submit" type="submit" disabled>Verifying...</button>
    </form>
  </section>
{% endblock content %}

{% block scripts %}
  <script>
    const btn = document.getElementById("submit");
    function onTurnstileSuccess(token) {
      btn.innerText = "Sign Up";
      btn.disabled = false;
    }
    function onTurnstileError() {
      btn.classList.add(":red");
      btn.innerText = "Captcha Failed";
      btn.disabled = true;
    }
  </script>
{% endblock scripts %}
