{% extends "layout.tera.html" %}

{% block title %}Send post - {{ post.title }}{% endblock title %}

{% block content %}
<form method="POST" action="/p/{{ post.url }}/send">
    <h1 class="pb-4">{{ post.title }}</h1>
    <div class="field">
        <label for="list_id">Send to list</label>
        <select name="list_id">
            {% for list in lists %}
            <option value="{{ list.id }}">{{ list.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit">Send</button>
</form>
{% endblock content %}
