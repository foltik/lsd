{% extends "layout.tera.html" %}

{% block title %}{{ post.title }}{% endblock title %}

{% block content %}
<div id="post">
  <article>
    <header>
      <h1>{{ post.title }}</h1>
      <time datetime="{{ post.created_at }}">
        {{ post.created_at | format_datetime(format="%b %d, %Y") }}
      </time>
   </header>
   <section>
     {{ post.content | safe }}
   </div>
  </section>
</div>
{% endblock content %}
